];

// 下面JS逻辑完全不动
let currentStyle = 'all';
let currentBody = 'all';
let currentService = 'all';

document.addEventListener('DOMContentLoaded', function () {
    renderGirls();
    setupFilters();
});

function setupFilters() {
    document.querySelectorAll('#styleFilter .filter-btn').forEach(btn => {
        btn.addEventListener('click', function () {
            document.querySelectorAll('#styleFilter .filter-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentStyle = this.dataset.style;
            renderGirls();
        });
    });

    document.querySelectorAll('#bodyFilter .filter-btn').forEach(btn => {
        btn.addEventListener('click', function () {
            document.querySelectorAll('#bodyFilter .filter-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentBody = this.dataset.body;
            renderGirls();
        });
    });

    document.querySelectorAll('#serviceFilter .filter-btn').forEach(btn => {
        btn.addEventListener('click', function () {
            document.querySelectorAll('#serviceFilter .filter-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentService = this.dataset.service;
            renderGirls();
        });
    });
}

function renderGirls() {
    const grid = document.getElementById('girlsGrid');

    let filteredGirls = girlsData.filter(girl => {
        const styleMatch = currentStyle === 'all' || girl.style === currentStyle;
        const bodyMatch = currentBody === 'all' || girl.body === currentBody;
        const serviceMatch = currentService === 'all' || girl.services.includes(currentService);
        return styleMatch && bodyMatch && serviceMatch;
    });

    grid.innerHTML = filteredGirls.map(girl => `
        <div class="girl-card" onclick="openModal(${girl.id})">
            <img src="static/images/girls/${girl.id}.jpg">
            <div class="distance-badge">📍 ${girl.distance}</div>
            ${girl.online ? '<div class="online-badge">متصلة</div>' : ''}
            <div class="girl-overlay">
                <div class="girl-name">${girl.name}</div>
                <div class="girl-age">${girl.age} سنة</div>
                <div class="girl-tags">
                    ${girl.tags.slice(0, 3).map(tag => `<span class="girl-tag">${tag}</span>`).join('')}
                </div>
            </div>
        </div>
    `).join('');
}

function openModal(id) {
    const girl = girlsData.find(g => g.id === id);
    document.getElementById('modalImage').src = `static/images/girls/${girl.id}.jpg`;
    document.getElementById('modalName').textContent = `${girl.name} · ${girl.age} سنة`;
    document.getElementById('modalDesc').textContent = girl.desc;
    document.getElementById('modalTags').innerHTML = girl.tags.map(tag =>
        `<span class="modal-tag">${tag}</span>`
    ).join('');
    document.getElementById('modalOverlay').classList.add('active');
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('active');
}

</script>
